# docker compose yaml

version: '3.8'

# Frontend services
services:
  mobile-frontend:
    image: mobile-shop/frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile

    ports:
      - "3000:3000"

    environment:
      - REACT_APP_URI="localhost:3000"
      - NODE_ENV=production
    depends_on:
      - mobile-backend
    networks:
      - mobile-network
  mobile-backend:
    image: "mobile-backend/backend:latest"
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URI=postgresql://postgres:postgres@localhost:5432/mobile_db
      - REDIS_URI=redis://redis:6379
      - JWT_SECRET={JWT_SECRET}
    depends_on:
      - postgres
      - redis
    volumes:
      - ./logs:/app/logs
    networks:
      - mobile-network

volumes:
  logs: