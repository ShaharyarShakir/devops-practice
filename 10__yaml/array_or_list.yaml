works_on:
  - android
  - ios
  - linux
  - macos
  - windows

# test_on: [iso, andriod]

devices:
  - name: andriod
    varities:
      - api-level: 16
      - abi: armeabi-v7a
      - api-level: 21
        abi: arm64-v8a
      - api-level: 21
        abi: x86
      - api-level: 21
        abi: x86_64

  - name: ios
    varities:
      - sdk: iphoneos
      - sdk: iphonesimulator

  - name: linux
    varities:
      - arch: x86_64

  - name: macos
    varities:
      - arch: x86_64

  - name: windows
    varities:
      - arch: x86_64
